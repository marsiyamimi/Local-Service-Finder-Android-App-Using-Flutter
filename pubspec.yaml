name: local_service_finder
description: A full-featured local service marketplace app connecting users with service providers.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3

  # State Management
  provider: ^6.1.2

  # Local Storage
  shared_preferences: ^2.3.3

  # Maps
  google_maps_flutter: ^2.9.0

  # UI & Animations
  animate_do: ^3.3.4
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_rating_bar: ^4.0.1
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  firebase_storage: ^12.3.4
  fluttertoast: ^8.2.8
  flutter_staggered_animations: ^1.1.1
  smooth_page_indicator: ^1.2.0+3

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
